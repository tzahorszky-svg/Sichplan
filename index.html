const getAllItems = () => Object.values(CATS).flatMap(c => c.items);
const getItem    = id => getAllItems().find(i => i.id === id);
const getCat     = typeId => Object.values(CATS).find(c => c.items.some(i => i.id === typeId));
const getCable   = id => CABLES.find(c => c.id === id) || CABLES[0];

const genId = () => `n${_nid++}`;

// ═══════════════════════════════════════════════════════
//  NORMZEICHEN (SVG)
// ═══════════════════════════════════════════════════════
function Sym({typeId, size=44}) {
  const s=size, h=s/2, sw=Math.max(1,s/30);
  const cat=getCat(typeId);
  const col=cat?.color||"#6b7280";
  const W=(ch)=>(
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} style={{overflow:"visible",display:"block"}}>
      {ch}
    </svg>
  );

  // BMA
  if(typeId==="bma_rme") return W(<><circle cx={h} cy={h} r={h-3} fill="white" stroke={col} strokeWidth={sw}/><line x1={7} y1={h} x2={s-7} y2={h} stroke={col} strokeWidth={sw}/><circle cx={h} cy={h} r={2.5} fill={col}/></>);
  if(typeId==="bma_rmt") return W(<><circle cx={h} cy={h} r={h-3} fill="white" stroke={col} strokeWidth={sw}/><path d={`M${h-8},${h-2} Q${h-3},${h-7} ${h},${h-2} Q${h+3},${h+3} ${h+8},${h-2}`} fill="none" stroke={col} strokeWidth={sw}/><path d={`M${h-8},${h+4} Q${h-3},${h-1} ${h},${h+4} Q${h+3},${h+9} ${h+8},${h+4}`} fill="none" stroke={col} strokeWidth={sw}/></>);
  if(typeId==="bma_rmc") return W(<><circle cx={h} cy={h} r={h-3} fill="white" stroke={col} strokeWidth={sw}/><text x={h} y={h+1} textAnchor="middle" dominantBaseline="middle" fontSize={s*0.22} fontWeight="700" fill={col}>CO</text></>);
  if(typeId==="bma_hfm") return W(<><rect x={5} y={6} width={s-10} height={s-11} rx={2} fill="white" stroke={col} strokeWidth={sw}/><line x1={5} y1={6} x2={s-5} y2={s-5} stroke={col} strokeWidth={sw}/><rect x={13} y={11} width={s/2-4} height={7} rx={1} fill={col}/></>);
  if(typeId==="bma_bmz") return W(<><rect x={3} y={5} width={s-6} height={s-9} rx={2} fill="white" stroke={col} strokeWidth={sw+0.5}/><line x1={3} y1={15} x2={s-3} y2={15} stroke={col} strokeWidth={1}/><text x={h} y={h+5} textAnchor="middle" dominantBaseline="middle" fontSize={s*0.2} fontWeight="700" fill={col}>BMZ</text></>);
  if(typeId==="bma_fbf") return W(<><rect x={3} y={5} width={s-6} height={s-9} rx={2} fill="white" stroke={col} strokeWidth={sw}/><text x={h} y={h-2} textAnchor="middle" dominantBaseline="middle" fontSize={s*0.18} fontWeight="700" fill={col}>FBF</text><circle cx={h} cy={h+8} r={3} fill={col}/></>);
  if(typeId==="bma_snd") return W(<><polygon points={`6,${h-6} 6,${h+6} ${s-8},${h+11} ${s-8},${h-11}`} fill="white" stroke={col} strokeWidth={sw}/><path d={`M${s-5},${h-7} Q${s},${h} ${s-5},${h+7}`} fill="none" stroke={col} strokeWidth={sw}/></>);
  if(typeId==="bma_bli") return W(<><circle cx={h} cy={h} r={h-3} fill="white" stroke={col} strokeWidth={sw}/><polygon points={`${h},7 ${h-5},${h+2} ${h},${h-2} ${h-5},${s-8} ${h+5},${h-2} ${h},${h+2}`} fill={col}/></>);
  if(typeId==="bma_lrm") return W(<><circle cx={9} cy={h} r={7} fill="white" stroke={col} strokeWidth={sw}/><circle cx={s-9} cy={h} r={7} fill="white" stroke={col} strokeWidth={sw}/><line x1={16} y1={h} x2={s-16} y2={h} stroke={col} strokeWidth={1} strokeDasharray="3 2"/></>);
  if(typeId==="bma_mac") return W(<><rect x={3} y={5} width={s-6} height={s-9} rx={2} fill="white" stroke={col} strokeWidth={sw}/><text x={h} y={h+1} textAnchor="middle" dominantBaseline="middle" fontSize={s*0.18} fontWeight="700" fill={col}>MG</text></>);

  // EMA
  if(typeId==="ema_pir") return W(<><path d={`M${h},${s-7} L4,8 A${h-4},${h-4} 0 0 1 ${s-4},8 Z`} fill="white" stroke={col} strokeWidth={sw}/>{[8,h,s-8].map((tx,i)=><line key={i} x1={h} y1={s-7} x2={tx} y2={12} stroke={col} strokeWidth={0.8}/>)}<circle cx={h} cy={s-7} r={2} fill={col}/></>);
  if(typeId==="ema_mk")  return W(<><rect x={6} y={7} width={13} height={s-13} rx={2} fill="white" stroke={col} strokeWidth={sw}/><rect x={s-19} y={7} width={13} height={s-13} rx={2} fill="white" stroke={col} strokeWidth={sw}/><line x1={19} y1={h} x2={s-19} y2={h} stroke={col} strokeWidth={0.8} strokeDasharray="2 2"/></>);
  if(typeId==="ema_gb")  return W(<><rect x={4} y={4} width={s-8} height={s-8} rx={1} fill="white" stroke={col} strokeWidth={sw}/><polyline points={`7,16 14,${h-4} 21,${h+4} 29,10`} fill="none" stroke={col} strokeWidth={1.5}/></>);
  if(typeId==="ema_vib") return W(<><rect x={4} y={7} width={s-8} height={s-13} rx={3} fill="white" stroke={col} strokeWidth={sw}/><path d={`M7,${h} Q13,${h-9} ${h},${h} Q${h+6},${h+9} ${s-7},${h}`} fill="none" stroke={col} strokeWidth={1.5}/></>);
  if(typeId==="ema_zkz") return W(<><rect x={3} y={5} width={s-6} height={s-9} rx={2} fill="white" stroke={col} strokeWidth={sw+0.5}/><line x1={3} y1={15} x2={s-3} y2={15} stroke={col} strokeWidth={1}/><text x={h} y={h+5} textAnchor="middle" dominantBaseline="middle" fontSize={s*0.2} fontWeight="700" fill={col}>EMA</text></>);
  if(typeId==="ema_bda") return W(<><rect x={3} y={5} width={s-6} height={s-9} rx={2} fill="white" stroke={col} strokeWidth={sw}/>{[0,1,2].map(i=><circle key={i} cx={11+i*9} cy={h+8} r={2.5} fill={col}/>)}</>);
  if(typeId==="ema_sir") return W(<><polygon points={`7,${h-5} 7,${h+5} ${s-7},${h+10} ${s-7},${h-10}`} fill="white" stroke={col} strokeWidth={sw}/><circle cx={s-4} cy={h} r={3} fill="white" stroke={col} strokeWidth={1}/></>);
  if(typeId==="ema_uem") return W(<><circle cx={h} cy={h} r={h-3} fill="white" stroke={col} strokeWidth={sw}/><text x={h} y={h+1} textAnchor="middle" dominantBaseline="middle" fontSize={s*0.3} fontWeight="700" fill={col}>!</text></>);

// ═══════════════════════════════════════════════════════
//  HAUPTKOMPONENTE
// ═══════════════════════════════════════════════════════
function App() {
  const [comps,   setComps]   = useState([]);
  const [conns,   setConns]   = useState([]);
  const [tool,    setTool]    = useState("select");
  const [pType,   setPType]   = useState(null);
  const [selC,    setSelC]    = useState(null);
  const [selConn, setSelConn] = useState(null);
  const [linking, setLinking] = useState(null);
  const [cable,   setCable]   = useState("nhxch_2");
  const [bgImg,   setBgImg]   = useState(null);
  const [bgSz,    setBgSz]    = useState({w:1600,h:1100});
  const [zoom,    setZoom]    = useState(1);
  const [pan,     setPan]     = useState({x:60,y:40});
  const [exp,     setExp]     = useState({bma:true,ema:true,zk:false,vt:false,saa:false,intercom:false});
  const [drag,    setDrag]    = useState(null);
  const [panning, setPanning] = useState(false);
  const [panSt,   setPanSt]   = useState(null);
  const [hover,   setHover]   = useState(null);
  const [rTab,    setRTab]    = useState("props");

  const svgRef   = useRef(null);
  const imgRef   = useRef(null);
  const jsonRef  = useRef(null);

  const toWorld = useCallback((cx,cy)=>{
    const r=svgRef.current?.getBoundingClientRect();
    if(!r) return {x:0,y:0};
    return {x:(cx-r.left-pan.x)/zoom, y:(cy-r.top-pan.y)/zoom};
  },[pan,zoom]);

  // Non-passive wheel
  useEffect(()=>{
    const el=svgRef.current; if(!el) return;
    const h=e=>{
      e.preventDefault();
      setZoom(z=>Math.max(0.1,Math.min(8,z*(e.deltaY<0?1.13:0.88))));
    };
    el.addEventListener("wheel",h,{passive:false});
    return ()=>el.removeEventListener("wheel",h);
  },[]);

  // Keyboard
  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
      if(e.key==="v") setTool("select");
      if(e.key==="p") setTool("place");
      if(e.key==="c") setTool("connect");
      if(e.key==="d") setTool("delete");
      if(e.key==="Escape"){setLinking(null);setPType(null);setTool("select");}
      if((e.key==="Delete"||e.key==="Backspace")&&selC){
        setComps(p=>p.filter(c=>c.id!==selC));
        setConns(p=>p.filter(c=>c.from!==selC&&c.to!==selC));
        setSelC(null);
      }
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  },[selC]);

  const onBgDown=useCallback(e=>{
    const isBg=e.target===svgRef.current||e.target.dataset.bg==="1";
    if(!isBg) return;
    if(tool==="place"&&pType){
      const pt=toWorld(e.clientX,e.clientY);
      const item=getItem(pType);
      setComps(p=>[...p,{id:genId(),typeId:pType,x:Math.round(pt.x),y:Math.round(pt.y),label:item?.short||"?",floor:"EG",cable:item?.cable||"nhxch"}]);
    } else if(tool==="select"){
      setSelC(null);setSelConn(null);
      setPanning(true);setPanSt({x:e.clientX-pan.x,y:e.clientY-pan.y});
    }
  },[tool,pType,toWorld,pan]);

  const onMove=useCallback(e=>{
    if(drag){
      const pt=toWorld(e.clientX,e.clientY);
      setComps(p=>p.map(c=>c.id===drag.id?{...c,x:Math.round(pt.x-drag.ox),y:Math.round(pt.y-drag.oy)}:c));
    } else if(panning&&panSt){
      setPan({x:e.clientX-panSt.x,y:e.clientY-panSt.y});
    }
  },[drag,panning,panSt,toWorld]);

  const onUp=useCallback(()=>{setDrag(null);setPanning(false);},[]);

  const onCompDown=useCallback((e,id)=>{
    e.stopPropagation();
    if(tool==="delete"){
      setComps(p=>p.filter(c=>c.id!==id));
      setConns(p=>p.filter(c=>c.from!==id&&c.to!==id));
      if(selC===id) setSelC(null);
      return;
    }
    if(tool==="connect"){
      if(!linking){setLinking(id);}
      else if(linking!==id){
        setConns(p=>[...p,{id:`k${Date.now()}`,from:linking,to:id,cableId:cable,length:0}]);
        setLinking(null);
      }
      return;
    }
    if(tool==="select"){
      setSelC(id);setSelConn(null);setRTab("props");
      const comp=comps.find(c=>c.id===id);
      if(comp){const pt=toWorld(e.clientX,e.clientY);setDrag({id,ox:pt.x-comp.x,oy:pt.y-comp.y});}
    }
  },[tool,linking,cable,selC,comps,toWorld]);

  const upC=(k,v)=>setComps(p=>p.map(c=>c.id===selC?{...c,[k]:v}:c));
  const upK=(k,v)=>setConns(p=>p.map(c=>c.id===selConn?{...c,[k]:v}:c));

  const selComp=useMemo(()=>comps.find(c=>c.id===selC),[comps,selC]);
  const selConnObj=useMemo(()=>conns.find(c=>c.id===selConn),[conns,selConn]);

  const parts=useMemo(()=>{
    const byType={};
    comps.forEach(c=>{
      if(!byType[c.typeId]){const it=getItem(c.typeId);const cat=getCat(c.typeId);byType[c.typeId]={...it,catLabel:cat?.label,catColor:cat?.color,qty:0};}
      byType[c.typeId].qty++;
    });
    const byC={};
    conns.forEach(conn=>{
      if(!byC[conn.cableId]) byC[conn.cableId]={...getCable(conn.cableId),cnt:0,m:0};
      byC[conn.cableId].cnt++;byC[conn.cableId].m+=conn.length||0;
    });
    return{comps:Object.values(byType),cables:Object.values(byC)};
  },[comps,conns]);

  const zones=useMemo(()=>{
    const z={};
    comps.forEach(c=>{const k=c.floor||"EG";if(!z[k])z[k]=[];z[k].push(c);});
    return z;
  },[comps]);

  const handleImg=e=>{
    const f=e.target.files[0];if(!f)return;
    const url=URL.createObjectURL(f);
    const img=new Image();img.onload=()=>setBgSz({w:img.naturalWidth,h:img.naturalHeight});img.src=url;
    setBgImg(url);e.target.value="";
  };
  const save=()=>{
    const b=new Blob([JSON.stringify({comps,conns},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="sicherheitsplan.json";a.click();
  };
  const load=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);setComps(d.comps||[]);setConns(d.conns||[]);}catch{}};
    r.readAsText(f);e.target.value="";
  };

  const btn=(active,danger)=>({
    padding:"4px 9px",borderRadius:4,border:"none",cursor:"pointer",
    fontSize:11,fontWeight:600,whiteSpace:"nowrap",
    background:danger?"#1a0a0a":active?"#2563eb":"#1e293b",
    color:danger?"#ef4444":"#f1f5f9",
  });

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#0f172a",color:"#e2e8f0",overflow:"hidden"}}>

      {/* TOP BAR */}
      <div style={{background:"#0a1628",borderBottom:"1px solid #1e293b",padding:"5px 10px",
        display:"flex",alignItems:"center",gap:5,flexShrink:0,overflowX:"auto"}}>

        <span style={{fontSize:13,fontWeight:800,marginRight:4,flexShrink:0,
          background:"linear-gradient(135deg,#ef4444,#06b6d4)",
          WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
          🛡️ SichPlan Pro
        </span>
        <div style={{width:1,height:16,background:"#1e293b",flexShrink:0}}/>

        <input type="file" ref={imgRef} accept="image/*" style={{display:"none"}} onChange={handleImg}/>
        <input type="file" ref={jsonRef} accept=".json" style={{display:"none"}} onChange={load}/>
        <button onClick={()=>imgRef.current.click()} style={btn(false)}>📂 Bild</button>
        <button onClick={()=>jsonRef.current.click()} style={btn(false)}>📂 Laden</button>
        <button onClick={save} style={btn(false)}>💾 Speichern</button>
        {bgImg&&<button onClick={()=>setBgImg(null)} style={btn(false)}>✕ Bild</button>}

        <div style={{width:1,height:16,background:"#1e293b",flexShrink:0}}/>
        {[["select","🖱️","Auswahl","V"],["place","📍","Platzieren","P"],
          ["connect","⚡","Verbinden","C"],["delete","🗑️","Löschen","D"]].map(([t,ic,lb,k])=>(
          <button key={t} onClick={()=>{setTool(t);if(t!=="place")setPType(null);}} style={btn(tool===t)} title={lb+" ["+k+"]"}>{ic} {lb}</button>
        ))}

        <div style={{width:1,height:16,background:"#1e293b",flexShrink:0}}/>
        <span style={{fontSize:10,color:"#475569",flexShrink:0}}>Kabel:</span>
        <select value={cable} onChange={e=>setCable(e.target.value)}
          style={{fontSize:10,background:"#1e293b",color:"#e2e8f0",border:"1px solid #334155",borderRadius:4,padding:"3px 6px",maxWidth:180}}>
          {CABLE_GROUPS.map(grp=>(
            <optgroup key={grp.label} label={grp.label}>
              {grp.ids.map(id=>{const c=getCable(id);return c?<option key={id} value={id}>{c.name} {c.spec}</option>:null;})}
            </optgroup>
          ))}
        </select>

        <div style={{width:1,height:16,background:"#1e293b",flexShrink:0}}/>
        <button onClick={()=>setZoom(z=>Math.min(8,z*1.2))} style={btn(false)}>+</button>
        <span style={{fontSize:10,color:"#475569",minWidth:34,textAlign:"center",flexShrink:0}}>{Math.round(zoom*100)}%</span>
        <button onClick={()=>setZoom(z=>Math.max(0.1,z/1.2))} style={btn(false)}>−</button>
        <button onClick={()=>{setZoom(1);setPan({x:60,y:40});}} style={btn(false)}>↺</button>

        {linking&&<span style={{fontSize:10,background:"#451a03",color:"#fbbf24",padding:"2px 8px",borderRadius:20,flexShrink:0}}>⚡ {comps.find(c=>c.id===linking)?.label} → Ziel [Esc]</span>}
        {tool==="place"&&pType&&<span style={{fontSize:10,background:"#14532d",color:"#86efac",padding:"2px 8px",borderRadius:20,flexShrink:0}}>📍 {getItem(pType)?.name}</span>}
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* LEFT - Library */}
        <div style={{width:210,background:"#0a1628",borderRight:"1px solid #1e293b",display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden"}}>
          <div style={{padding:"6px 10px",fontSize:8,fontWeight:700,letterSpacing:1,color:"#334155",borderBottom:"1px solid #1e293b",flexShrink:0}}>KOMPONENTENBIBLIOTHEK</div>
          <div style={{flex:1,overflowY:"auto"}}>
            {Object.entries(CATS).map(([catId,cat])=>(
              <div key={catId}>
                <div onClick={()=>setExp(p=>({...p,[catId]:!p[catId]}))}
                  style={{padding:"6px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,
                    background:"#1e293b",borderBottom:"1px solid #0a1628",borderLeft:`3px solid ${cat.color}`}}>
                  <span style={{fontSize:8,color:"#475569"}}>{exp[catId]?"▼":"▶"}</span>
                  <span style={{fontSize:10,fontWeight:700,color:cat.color}}>{cat.label}</span>
                  <span style={{fontSize:7,color:"#334155",marginLeft:"auto"}}>{cat.short}</span>
                </div>
                {exp[catId]&&cat.items.map(item=>{
                  const act=pType===item.id&&tool==="place";
                  return(
                    <div key={item.id} onClick={()=>{setTool("place");setPType(item.id);}}
                      style={{padding:"4px 8px 4px 6px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,
                        borderBottom:"1px solid #0a1628",
                        background:act?"#162032":"transparent",
                        borderLeft:`3px solid ${act?cat.color:"transparent"}`}}>
                      <div style={{flexShrink:0}}><Sym typeId={item.id} size={26}/></div>
                      <div>
                        <div style={{fontSize:9,fontWeight:600,color:act?"#f1f5f9":"#94a3b8",lineHeight:1.3}}>{item.name}</div>
                        <div style={{fontSize:7,color:"#334155"}}>{item.norm}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>

        {/* CENTER - Canvas */}
        <div style={{flex:1,overflow:"hidden",position:"relative",background:"#0f172a"}}
          onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}>

          {!bgImg&&comps.length===0&&(
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
              textAlign:"center",color:"#1e293b",pointerEvents:"none"}}>
              <div style={{fontSize:56}}>📋</div>
              <div style={{fontSize:14,fontWeight:700,marginTop:8,color:"#334155"}}>Grundriss laden oder Komponenten platzieren</div>
              <div style={{fontSize:11,color:"#1e293b",marginTop:5}}>Komponente links wählen → auf Plan klicken | Verbinden [C] | Zoom: Scroll</div>
            </div>
          )}

          <svg ref={svgRef} width="100%" height="100%"
            style={{cursor:tool==="place"?"crosshair":tool==="delete"?"not-allowed":panning?"grabbing":"grab",display:"block"}}
            onMouseDown={onBgDown}>
            <defs>
              <pattern id="g" width={40*zoom} height={40*zoom} patternUnits="userSpaceOnUse" x={pan.x%(40*zoom)} y={pan.y%(40*zoom)}>
                <path d={`M ${40*zoom} 0 L 0 0 0 ${40*zoom}`} fill="none" stroke="#1a2744" strokeWidth="0.5"/>
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill="#0f172a"/>
            <rect width="100%" height="100%" fill="url(#g)"/>
            <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
              {bgImg&&<image href={bgImg} x={0} y={0} width={bgSz.w} height={bgSz.h} preserveAspectRatio="xMidYMid meet" data-bg="1"/>}
              {!bgImg&&<rect x={0} y={0} width={1600} height={1100} fill="white" opacity={0.02} rx={4} stroke="#1e293b" strokeWidth={1} data-bg="1"/>}

              {/* Connections */}
              {conns.map(conn=>{
                const a=comps.find(c=>c.id===conn.from),b=comps.find(c=>c.id===conn.to);
                if(!a||!b) return null;
                const cl=getCable(conn.cableId);
                const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
                const sel=selConn===conn.id;
                return(
                  <g key={conn.id} style={{cursor:"pointer"}}
                    onClick={e=>{e.stopPropagation();setSelConn(conn.id);setSelC(null);setRTab("props");}}>
                    <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="transparent" strokeWidth={14}/>
                    <line x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                      stroke={sel?"#f59e0b":(cl?.color||"#475569")}
                      strokeWidth={sel?3:2} strokeDasharray={cl?.dash||""}/>
                    <rect x={mx-24} y={my-7} width={48} height={13} rx={3} fill="#0a1628" stroke={cl?.color||"#1e293b"} strokeWidth={0.8}/>
                    <text x={mx} y={my+1} textAnchor="middle" dominantBaseline="middle" fontSize={6.5} fill={cl?.color||"#64748b"} fontWeight="600">
                      {cl?.name?.split(" ")[0]} {cl?.spec}
                    </text>
                    {conn.length>0&&<text x={mx} y={my+11} textAnchor="middle" fontSize={6} fill="#475569">{conn.length} m</text>}
                  </g>
                );
              })}

              {/* Components */}
              {comps.map(comp=>{
                const sel=selC===comp.id,lnk=linking===comp.id;
                const cat=getCat(comp.typeId);
                return(
                  <g key={comp.id} transform={`translate(${comp.x-22},${comp.y-22})`}
                    style={{cursor:tool==="delete"?"not-allowed":tool==="connect"?"crosshair":"move"}}
                    onMouseDown={e=>onCompDown(e,comp.id)}
                    onMouseEnter={()=>setHover(comp.id)}
                    onMouseLeave={()=>setHover(null)}>
                    <rect x={1} y={2} width={44} height={44} rx={4} fill="black" opacity={0.3}/>
                    <rect x={0} y={0} width={44} height={44} rx={4}
                      fill={sel?"#162032":lnk?"#2d1200":"#f8fafc"}
                      stroke={sel?"#3b82f6":lnk?"#f59e0b":(cat?.color+"44"||"#e2e8f0")}
                      strokeWidth={sel||lnk?2:1}/>
                    <Sym typeId={comp.typeId} size={44}/>
                    <text x={22} y={55} textAnchor="middle" fontSize={8.5} fontWeight="700" fill={cat?.color||"#94a3b8"}>{comp.label}</text>
                    {hover===comp.id&&(
                      <g transform="translate(47,-6)">
                        <rect x={0} y={0} width={130} height={30} rx={4} fill="#1e293b" stroke="#334155" strokeWidth={1}/>
                        <text x={7} y={12} fontSize={9} fill="#f1f5f9" fontWeight="600">{getItem(comp.typeId)?.name}</text>
                        <text x={7} y={24} fontSize={7} fill="#475569">{getItem(comp.typeId)?.norm}</text>
                      </g>
                    )}
                  </g>
                );
              })}
            </g>
          </svg>
        </div>

        {/* RIGHT - Properties/Parts/Dist */}
        <div style={{width:280,background:"#0a1628",borderLeft:"1px solid #1e293b",display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{display:"flex",gap:2,padding:"5px 6px",borderBottom:"1px solid #1e293b",flexShrink:0}}>
            {[["props","Eigenschaften"],["parts","Stückliste"],["dist","Verteiler"]].map(([t,l])=>(
              <button key={t} onClick={()=>setRTab(t)}
                style={{flex:1,padding:"4px 2px",fontSize:9,fontWeight:700,
                  background:rTab===t?"#162032":"transparent",
                  color:rTab===t?"#3b82f6":"#334155",
                  border:rTab===t?"1px solid #1e3a5f":"1px solid transparent",
                  borderRadius:4,cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>

          <div style={{flex:1,overflowY:"auto",padding:10}}>

            {/* EIGENSCHAFTEN */}
            {rTab==="props"&&(
              <div>
                {selComp?(
                  <>
                    <div style={{display:"flex",justifyContent:"center",marginBottom:10,background:"#1e293b",borderRadius:8,padding:10}}>
                      <Sym typeId={selComp.typeId} size={50}/>
                    </div>
                    <div style={{fontSize:11,fontWeight:700,color:"#f1f5f9",marginBottom:2}}>{getItem(selComp.typeId)?.name}</div>
                    <div style={{fontSize:9,color:"#475569",fontFamily:"monospace",marginBottom:10}}>{getItem(selComp.typeId)?.norm}</div>
                    {[["Bezeichnung","label"],["Etage / Zone","floor"]].map(([lb,key])=>(
                      <div key={key} style={{marginBottom:8}}>
                        <div style={{fontSize:8,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:3}}>{lb.toUpperCase()}</div>
                        <input value={selComp[key]||""} onChange={e=>upC(key,e.target.value)}
                          style={{width:"100%",padding:"5px 7px",background:"#1e293b",border:"1px solid #334155",borderRadius:4,color:"#e2e8f0",fontSize:11,boxSizing:"border-box"}}/>
                      </div>
                    ))}
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:8,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:3}}>ANSCHLUSSKABEL</div>
                      <select value={selComp.cable||"nhxch"} onChange={e=>upC("cable",e.target.value)}
                        style={{width:"100%",padding:"5px 7px",background:"#1e293b",border:"1px solid #334155",borderRadius:4,color:"#e2e8f0",fontSize:10}}>
                        {CABLE_GROUPS.map(grp=>(<optgroup key={grp.label} label={grp.label}>{grp.ids.map(id=>{const c=getCable(id);return c?<option key={id} value={id}>{c.name} {c.spec}</option>:null;})}</optgroup>))}
                      </select>
                    </div>
                    <button onClick={()=>{setComps(p=>p.filter(c=>c.id!==selC));setConns(p=>p.filter(c=>c.from!==selC&&c.to!==selC));setSelC(null);}}
                      style={{width:"100%",padding:"6px",background:"#1a0a0a",color:"#ef4444",border:"1px solid #3d0000",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:600}}>
                      🗑️ Löschen
                    </button>
                  </>
                ):selConnObj?(
                  <>
                    <div style={{fontSize:11,fontWeight:700,color:"#f1f5f9",marginBottom:8}}>⚡ Verbindung</div>
                    {(()=>{
                      const fr=comps.find(c=>c.id===selConnObj.from),to=comps.find(c=>c.id===selConnObj.to);
                      const cl=getCable(selConnObj.cableId);
                      return(<>
                        <div style={{background:"#1e293b",borderRadius:6,padding:"8px 10px",marginBottom:8}}>
                          <div style={{fontSize:10,marginBottom:3}}>Von: <b style={{color:"#e2e8f0"}}>{fr?.label}</b></div>
                          <div style={{fontSize:10}}>Nach: <b style={{color:"#e2e8f0"}}>{to?.label}</b></div>
                        </div>
                        <div style={{marginBottom:8}}>
                          <div style={{fontSize:8,color:"#475569",fontWeight:700,marginBottom:3}}>KABELTYP</div>
                          <select value={selConnObj.cableId} onChange={e=>upK("cableId",e.target.value)}
                            style={{width:"100%",padding:"5px 7px",background:"#1e293b",border:"1px solid #334155",borderRadius:4,color:"#e2e8f0",fontSize:10}}>
                            {CABLE_GROUPS.map(grp=>(<optgroup key={grp.label} label={grp.label}>{grp.ids.map(id=>{const c=getCable(id);return c?<option key={id} value={id}>{c.name} {c.spec}</option>:null;})}</optgroup>))}
                          </select>
                        </div>
                        <div style={{marginBottom:10}}>
                          <div style={{fontSize:8,color:"#475569",fontWeight:700,marginBottom:3}}>LÄNGE (m)</div>
                          <input type="number" min={0} value={selConnObj.length||0} onChange={e=>upK("length",parseFloat(e.target.value)||0)}
                            style={{width:"100%",padding:"5px 7px",background:"#1e293b",border:"1px solid #334155",borderRadius:4,color:"#e2e8f0",fontSize:11,boxSizing:"border-box"}}/>
                        </div>
                        <button onClick={()=>{setConns(p=>p.filter(c=>c.id!==selConn));setSelConn(null);}}
                          style={{width:"100%",padding:"6px",background:"#1a0a0a",color:"#ef4444",border:"1px solid #3d0000",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:600}}>
                          🗑️ Verbindung löschen
                        </button>
                      </>);
                    })()}
                  </>
                ):(
                  <>
                    <div style={{color:"#1e3a5f",fontSize:11,textAlign:"center",padding:"14px 0 18px"}}>Komponente auswählen</div>
                    <div style={{fontSize:8,fontWeight:700,color:"#334155",letterSpacing:1,marginBottom:8}}>KABELLEGENDE</div>
                    {CABLE_GROUPS.map(grp=>(
                      <div key={grp.label} style={{marginBottom:10}}>
                        <div style={{fontSize:7,fontWeight:700,color:grp.color,letterSpacing:0.5,marginBottom:4,borderLeft:`2px solid ${grp.color}`,paddingLeft:5}}>{grp.label}</div>
                        {grp.ids.filter(id=>id!=="custom").map(id=>{
                          const cl=getCable(id);if(!cl)return null;
                          return(
                            <div key={id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                              <svg width={26} height={8} style={{flexShrink:0}}>
                                <line x1={0} y1={4} x2={26} y2={4} stroke={cl.color} strokeWidth={2.5} strokeDasharray={cl.dash}/>
                              </svg>
                              <div style={{minWidth:0}}>
                                <span style={{fontSize:8,fontWeight:600,color:cl.color}}>{cl.name} </span>
                                <span style={{fontSize:7,color:"#475569"}}>{cl.spec}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                    <div style={{marginTop:12,background:"#1e293b",borderRadius:7,padding:"9px 11px"}}>
                      <div style={{fontSize:8,fontWeight:700,color:"#334155",marginBottom:6}}>PROJEKT</div>
                      <div style={{fontSize:10,color:"#64748b",marginBottom:2}}>Komponenten: <b style={{color:"#3b82f6"}}>{comps.length}</b></div>
                      <div style={{fontSize:10,color:"#64748b",marginBottom:2}}>Verbindungen: <b style={{color:"#3b82f6"}}>{conns.length}</b></div>
                      <div style={{fontSize:10,color:"#64748b"}}>Zonen: <b style={{color:"#3b82f6"}}>{new Set(comps.map(c=>c.floor)).size}</b></div>
                    </div>
                    <div style={{marginTop:10,fontSize:8,color:"#1e3a5f",lineHeight:2}}>
                      {[["V","Auswahl"],["P","Platzieren"],["C","Verbinden"],["D","Löschen"],["Esc","Abbrechen"],["Del","Entfernen"],["Scroll","Zoom"]].map(([k,l])=>(
                        <div key={k}><span style={{display:"inline-block",background:"#1e293b",color:"#475569",padding:"0 4px",borderRadius:2,fontSize:7,fontFamily:"monospace",marginRight:5,border:"1px solid #334155"}}>{k}</span>{l}</div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            )}

            {/* STÜCKLISTE */}
            {rTab==="parts"&&(
              <div>
                <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",marginBottom:3}}>📋 Stückliste</div>
                <div style={{fontSize:8,color:"#334155",marginBottom:10}}>Stand: {new Date().toLocaleDateString("de-DE")}</div>
                {parts.comps.length===0?(
                  <div style={{color:"#1e293b",fontSize:11,textAlign:"center",padding:"24px 0"}}>Keine Komponenten</div>
                ):(
                  <>
                    {parts.comps.map((item,i)=>(
                      <div key={item.id} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 7px",borderRadius:5,marginBottom:3,background:i%2===0?"#0d1829":"#162032"}}>
                        <Sym typeId={item.id} size={24}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:9,fontWeight:600,color:"#e2e8f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                          <div style={{fontSize:7,color:"#334155",fontFamily:"monospace"}}>{item.norm}</div>
                        </div>
                        <div style={{fontSize:15,fontWeight:800,color:"#3b82f6",flexShrink:0}}>{item.qty}</div>
                      </div>
                    ))}
                    <div style={{padding:"7px 9px",background:"#1e293b",borderRadius:5,display:"flex",justifyContent:"space-between",marginTop:8,marginBottom:14}}>
                      <span style={{fontSize:10,color:"#64748b",fontWeight:700}}>GESAMT</span>
                      <span style={{fontSize:13,fontWeight:800,color:"#3b82f6"}}>{parts.comps.reduce((s,i)=>s+i.qty,0)} Stk.</span>
                    </div>
                    <div style={{fontSize:10,fontWeight:700,color:"#f1f5f9",marginBottom:7}}>🔌 Kabel</div>
                    {parts.cables.length===0?(
                      <div style={{color:"#1e293b",fontSize:10}}>Keine Verbindungen</div>
                    ):parts.cables.map((cl,i)=>(
                      <div key={cl.id} style={{padding:"6px 7px",borderRadius:5,marginBottom:3,background:i%2===0?"#0d1829":"#162032"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                          <svg width={26} height={6}><line x1={0} y1={3} x2={26} y2={3} stroke={cl.color} strokeWidth={2.5} strokeDasharray={cl.dash}/></svg>
                          <span style={{fontSize:9,fontWeight:700,color:cl.color}}>{cl.name}</span>
                          <span style={{fontSize:10,color:"#3b82f6",fontWeight:800,marginLeft:"auto"}}>{cl.m>0?`${cl.m} m`:`${cl.cnt}×`}</span>
                        </div>
                        <div style={{fontSize:7,color:"#334155"}}>{cl.spec} — {cl.desc}</div>
                      </div>
                    ))}
                  </>
                )}
              </div>
            )}

            {/* VERTEILER */}
            {rTab==="dist"&&(
              <div>
                <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",marginBottom:3}}>🗂️ Verteiler-Doku</div>
                <div style={{fontSize:8,color:"#334155",marginBottom:10}}>Geräte nach Zone · DIN 14675 / EN 50131</div>
                {Object.keys(zones).length===0?(
                  <div style={{color:"#1e293b",fontSize:11,textAlign:"center",padding:"24px 0"}}>Keine Komponenten</div>
                ):Object.entries(zones).sort().map(([zone,zcomps])=>(
                  <div key={zone} style={{marginBottom:12,border:"1px solid #1e293b",borderRadius:6,overflow:"hidden"}}>
                    <div style={{background:"#1e293b",padding:"6px 9px",display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:10,fontWeight:700,color:"#f1f5f9"}}>Zone: {zone}</span>
                      <span style={{fontSize:8,color:"#334155"}}>{zcomps.length} Geräte</span>
                    </div>
                    {zcomps.map((comp,i)=>{
                      const item=getItem(comp.typeId),cat=getCat(comp.typeId),cl=getCable(comp.cable);
                      return(
                        <div key={comp.id} style={{padding:"5px 9px",background:i%2===0?"#0d1829":"#0f172a",borderBottom:"1px solid #0a1628",display:"flex",alignItems:"center",gap:6}}>
                          <Sym typeId={comp.typeId} size={20}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:9,fontWeight:700,color:"#e2e8f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{comp.label}</div>
                            <div style={{fontSize:7,color:cat?.color}}>{item?.name}</div>
                            <div style={{fontSize:6,color:"#334155",fontFamily:"monospace"}}>{cl?.name} · {item?.norm}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            )}

          </div>
        </div>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .catch(e=>console.log('SW:',e));
  });
}
</script>
</body>
</html>
